<main class="app-shell">
  <section class="game-card">
    <app-game-header [headerTitle]="'WORDLE'" (restartRequested)="restartGame()"></app-game-header>

    <app-status-banner [text]="message()" [loading]="isLoading()"></app-status-banner>

    <app-word-grid
      [rows]="evaluatedRows()"
      [currentGuess]="currentGuess()"
      [maxRows]="maxAttempts"
      [wordLength]="wordLength"
    ></app-word-grid>

    <app-keyboard
      [keyStates]="keyStates()"
      [disabled]="isGameFinished() || isLoading()"
      (keyPressed)="handleInput($event)"
    ></app-keyboard>
  </section>
</main>
